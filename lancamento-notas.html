<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Lançamento de Notas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>

<body class="app-body">
  <nav class="navbar navbar-expand-lg navbar-dark app-navbar sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand d-flex flex-column lh-1" href="dashboard.html">
        <span class="brand-school">PEI Manoel Ignácio da Silva</span>
        <span class="brand-system">Conselho de Classe</span>
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#appNavbar"
        aria-controls="appNavbar" aria-expanded="false" aria-label="Alternar navegação">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="appNavbar">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>

          <li class="nav-item" data-role="professor,coordenacao">
            <a class="nav-link" href="lancamento-notas.html">Lançar Notas</a>
          </li>

          <li class="nav-item" data-role="professor,coordenacao">
            <a class="nav-link" href="conselho.html">Conselho</a>
          </li>

          <li class="nav-item" data-role="coordenacao">
            <a class="nav-link" href="dashboard-coordenacao.html">Coordenação</a>
          </li>

          <li class="nav-item" data-role="professor">
            <a class="nav-link" href="dashboard-professor.html">Professor</a>
          </li>

          <li class="nav-item" data-role="admin">
            <a class="nav-link" href="admin.html">Admin</a>
          </li>
        </ul>

        <div class="d-flex align-items-center gap-2">
          <span class="navbar-text small d-none d-md-inline" id="navUserLabel"></span>
          <button class="btn btn-outline-light btn-sm" id="btnLogout" type="button">Sair</button>
        </div>
      </div>
    </div>
  </nav>
  <main class="container-fluid py-4">
    <div class="app-page-title">
      <h2>Lançamento de Notas</h2>
    </div>
    <div class="app-card p-4">
      <div class="card p-4 mb-4">
        <h5 id="infoTurmaDisciplina"></h5>

        <div class="mb-3 mt-3">
          <label>Bimestre</label>
          <select id="bimestreSelect" class="form-select" onchange="carregarAlunos()">
            <option value="1">1º Bimestre</option>
            <option value="2">2º Bimestre</option>
            <option value="3">3º Bimestre</option>
            <option value="4">4º Bimestre</option>
          </select>
        </div>
      </div>

      <div class="card p-4">
        <div class="d-flex justify-content-between align-items-center">
          <h5 class="m-0">Alunos</h5>
          <div>
            <input type="file" id="inputMapao" accept=".xlsx, .xls" class="d-none">
            <button class="btn btn-success btn-sm" onclick="importarMapao()">
              Importar Mapão
            </button>
          </div>
        </div>

        <div id="tabelaAlunos" class="mt-3"></div>

        <button class="btn btn-success mt-3" onclick="salvarNotas()">
          💾 Salvar Notas
        </button>
      </div>


    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/util.js"></script>
  <script src="js/lancamento-notas.js"></script>
</body>

</html>
