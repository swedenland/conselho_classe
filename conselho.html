    <div class="collapse navbar-collapse" id="appNavbar">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>

        <!--

        <span class="navbar-text small d-none d-md-inline" id="navUserLabel"></span>
        <button class="btn btn-outline-light btn-sm" id="btnLogout" type="button">Sair</button>

  </div>
</nav>
<main class="container-fluid py-4">
  <div class="app-page-title"><h2>Conselho de Classe</h2></div>
  <div class="app-card p-4">
<!-- Título -->
  <!-- =========================
       ÁREA DE SELEÇÃO
  ========================== -->
  <div id="areaSelecao">

    <div class="card p-4 mb-4">
      <h5 class="mb-3">Selecionar Turma e Bimestre</h5>

      <div class="row g-3 align-items-end">
        <div class="col-md-5">
          <label class="form-label">Turma</label>
          <select id="turmaSelect" class="form-select"></select>
        </div>

        <div class="col-md-3">
          <label class="form-label">Bimestre</label>
          <select id="bimestreSelect" class="form-select">
            <option value="1">1º</option>
            <option value="2">2º</option>
            <option value="3">3º</option>
            <option value="4">4º</option>
          </select>
        </div>

        <div class="col-md-4 d-grid">
          <button class="btn btn-primary" onclick="carregarConselho()">
            Carregar Conselho
          </button>
        </div>
      </div>
    </div>

  </div>

  <!-- =========================
       ÁREA DO CONSELHO
  ========================== -->
  <div id="areaConselho" style="display:none;">

    <!-- Cabeçalho e Voltar -->
    <button class="btn btn-secondary" onclick="voltarSelecao()">Voltar</button>
    </div>

    <!-- Observações Gerais -->
    <div class="card p-4 mb-4">
      <h5 class="mb-3">Observações Gerais da Turma</h5>

      <label class="form-label">Observações</label>
      <textarea id="observacoesGerais" class="form-control" rows="3"></textarea>

      <div class="mt-3 d-flex gap-2">
        <button class="btn btn-success" onclick="salvarObservacoesGerais()">
          Salvar Observações Gerais
        </button>
      </div>
    </div>

    <!-- Tabela de Alunos -->
    <div class="card p-4 mb-4">
      <h5 class="mb-3">Alunos</h5>

      <div class="table-responsive">
        <table class="table table-bordered align-middle" id="tabelaAlunos">
          <!-- Cabeçalho dinâmico em 2 linhas (disciplinas + média/faltas) -->
          <thead class="table-light">
			  <tr id="headerTop">
				<th rowspan="2">RA</th>
				<th rowspan="2">Nome</th>
				<!-- Disciplinas entram aqui via JS (colspan=2) -->
				<th rowspan="2">Nível de Proficiência</th>
				<th rowspan="2">Indisciplina</th>
				<th rowspan="2">Concluído</th>
			  </tr>

			  <tr id="headerSub">
				<!-- Aqui entra "Média" e "Faltas" para cada disciplina via JS -->
			  </tr>
			</thead>

          <!-- Linhas -->
          <tbody id="corpoTabela"></tbody>
        </table>
      </div>

      <!-- Ações -->
      <div class="d-flex flex-wrap gap-2 mt-3">
        <button class="btn btn-success" onclick="salvarConselho()">
          Salvar Conselho
        </button>

        <button class="btn btn-dark" onclick="finalizarConselho()">
          Finalizar Conselho
        </button>
      </div>
    </div>

  </div>

  <!-- Scripts -->
  
  <!-- Modal Notas -->
	<div class="modal fade" id="modalNotas" tabindex="-1" aria-hidden="true">
	  <div class="modal-dialog modal-lg modal-dialog-scrollable">
		<div class="modal-content">
		  <div class="modal-header">
			<h5 class="modal-title" id="modalNotasTitulo">Notas</h5>
			<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
		  </div>
		  <div class="modal-body" id="modalNotasCorpo">
			<!-- Conteúdo via JS -->
		  </div>
		</div>
	  </div>
	</div>


</div>
</main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/conselho.js"></script>
</body>
